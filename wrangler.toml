# Static export from Next (`output: "export"` → `out/`). Deploy with `bun run deploy`.
# Requires: `bun run build` first so `out/` exists.
name = "resume-renderer"
compatibility_date = "2026-04-19"

[assets]
directory = "./out"
not_found_handling = "404-page"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1